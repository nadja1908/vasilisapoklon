<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Srećan rođendan Vasilisa</title>

  <style>
    :root {
      --brown: #3d2417;
      --gold: #bd842d;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #eee5d8;
      font-family: Georgia, serif;
      color: var(--brown);
      display: flex;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 12%, rgba(255,255,255,0.9), transparent 33%),
        linear-gradient(180deg, #fff8ed 0%, #f2dfc5 100%);
      box-shadow: 0 20px 60px rgba(58, 38, 20, 0.18);
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 22px;
      pointer-events: none;
      z-index: 20;
      display: none;
    }

    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 18px 24px 0;
      margin-bottom: -35px;
    }

    .eyebrow {
      font-family: Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 18px;
      color: rgba(61, 36, 23, 0.78);
    }

    .heart {
      color: var(--gold);
      font-size: 22px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 46px;
      line-height: 0.96;
      font-weight: 400;
      letter-spacing: 1px;
    }

    .name {
      font-family: "Brush Script MT", "Segoe Script", cursive;
      color: var(--gold);
      font-size: 58px;
      line-height: 0.9;
      margin: 14px 0 20px;
    }

    .hearts {
      color: var(--gold);
      font-size: 24px;
      margin-left: 6px;
    }

    .text {
      font-family: Arial, sans-serif;
      font-size: 16px;
      line-height: 1.4;
      margin-bottom: 18px;
      color: rgba(61, 36, 23, 0.88);
    }

    .text span {
      color: var(--gold);
      font-weight: 700;
    }

    button {
      width: 208px;
      border: none;
      background: var(--brown);
      color: #f6d7a6;
      padding: 15px 22px;
      border-radius: 11px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(61, 36, 23, 0.28);
    }

    .bottom-scene{
    position:absolute;
    left:0;
    right:0;
    bottom:-25px;
    height:450px;
    z-index:8;
  }

  .girl{
    position:absolute;
    object-fit:cover;
    object-position:center bottom;
    filter:drop-shadow(0 16px 24px rgba(0,0,0,.20));
    pointer-events:none;
    will-change: transform, opacity;
    animation: riseOut 1s cubic-bezier(.18,.9,.22,1) both;
  }

  .g1{
    left:-26px;
    bottom:0;
    height:470px;
    z-index:3;
  }

  .g2{
    left:46px;
    bottom:0px;
    height:380px;
    z-index:7;
  }

  .g3{
    right:54px;
    bottom:34px;
    height:380px;
    z-index:5;
  }

  .g4{
    right:-26px;
    bottom:0;
    height:470px;
    z-index:6;
  }

  .g1 { animation-delay: 0.05s; }
  .g2 { animation-delay: 0.18s; }
  .g3 { animation-delay: 0.3s; }
  .g4 { animation-delay: 0.42s; }

  @keyframes riseOut {
    0% {
      opacity: 0;
      transform: translateY(34px) scale(0.88);
    }
    70% {
      opacity: 1;
      transform: translateY(-8px) scale(1.02);
    }
    100% {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }
    .balloon {
      position: absolute;
      bottom: -8px;
      width: 78px;
      height: 78px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 32% 28%, rgba(255,255,255,0.9), transparent 18%),
        radial-gradient(circle, #fff1cd, #d6a34a);
      z-index: 2;
      opacity: 0.85;
    }

    .balloon.left {
      left: 20px;
    }

    .balloon.right {
      right: 20px;
    }

    .popup {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 99;
    }

    .popup.active {
      display: flex;
    }

    .popup-box {
      width: min(380px, 100%);
      background: #fff7ea;
      border-radius: 22px;
      padding: 20px;
      text-align: center;
      position: relative;
      box-shadow: 0 24px 70px rgba(0,0,0,0.35);
    }

    .popup-box img {
      width: 100%;
      border-radius: 16px;
      margin-bottom: 14px;
    }

    .popup-box h2 {
      font-size: 30px;
      font-weight: 400;
      margin-bottom: 8px;
    }

    .popup-box p {
      font-family: Arial, sans-serif;
      font-size: 15px;
    }

    .close {
      position: absolute;
      top: 6px;
      right: 14px;
      font-size: 32px;
      line-height: 1;
      cursor: pointer;
    }

    @media (max-width: 380px) {
      h1 {
        font-size: 42px;
      }

      .name {
        font-size: 52px;
      }

      .bottom-scene {
        height: 320px;
        bottom: -8px;
      }

      .g1 {
        left: -22px;
        bottom: 42px;
        height: 220px;
      }

      .g2 {
        left: 44px;
        height: 260px;
      }

      .g3 {
        right: 64px;
        bottom: 18px;
        height: 238px;
      }

      .g4 {
        right: -22px;
        height: 260px;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <section class="content">
      <div class="eyebrow">Za jednu posebnu osobu</div>

      <h1>SREĆAN<br>ROĐENDAN</h1>

      <div class="name">
        Vasilisa
      </div>

      <p class="text">
        Klikni ovde kako bi<br>
        preuzela <span>svoj poklon</span>
      </p>

      <button type="button" onclick="openGift()">KLIKNI OVDE 🎁</button>
    </section>

    <section class="bottom-scene" aria-hidden="true">
      <div class="balloon left"></div>
      <div class="balloon right"></div>

      <img class="girl g1" src="IMG_5889.PNG" alt="">
      <img class="girl g2" src="IMG_5890.PNG" alt="">
      <img class="girl g3" src="IMG_5891.PNG" alt="">
      <img class="girl g4" src="IMG_5892.PNG" alt="">
    </section>
  </main>

  <div class="popup" id="popup">
    <div class="popup-box">
      <span class="close" onclick="closeGift()">×</span>
      <img src="poklon.jpg" alt="Poklon">
    </div>
  </div>

  <script>
    const popup = document.getElementById("popup");

    function openGift() {
      popup.classList.add("active");
    }

    function closeGift() {
      popup.classList.remove("active");
    }

    popup.addEventListener("click", function (e) {
      if (e.target === popup) closeGift();
    });

    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") closeGift();
    });
  </script>
</body>
</html>
